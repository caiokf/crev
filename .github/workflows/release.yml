name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @caiokf/crev publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: crev-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: crev-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: crev-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: crev-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: crev-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: bun build --compile --target=${{ matrix.target }} ./packages/cli/dist/bin.js --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum */crev-* > ../checksums.txt
          cat ../checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/crev-linux-x64/crev-linux-x64
            artifacts/crev-linux-arm64/crev-linux-arm64
            artifacts/crev-darwin-x64/crev-darwin-x64
            artifacts/crev-darwin-arm64/crev-darwin-arm64
            artifacts/crev-windows-x64.exe/crev-windows-x64.exe
            checksums.txt

  update-homebrew:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: caiokf/homebrew-crev
          token: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}
      - name: Update formula
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/caiokf/crev/releases/download/${TAG}"
          SHA_DA=$(curl -sSL "${BASE}/crev-darwin-arm64" | sha256sum | cut -d' ' -f1)
          SHA_DX=$(curl -sSL "${BASE}/crev-darwin-x64" | sha256sum | cut -d' ' -f1)
          SHA_LX=$(curl -sSL "${BASE}/crev-linux-x64" | sha256sum | cut -d' ' -f1)
          SHA_LA=$(curl -sSL "${BASE}/crev-linux-arm64" | sha256sum | cut -d' ' -f1)
          {
            echo 'class Crev < Formula'
            echo '  desc "Multi-AI code review CLI"'
            echo '  homepage "https://github.com/caiokf/crev"'
            echo "  version \"${VERSION}\""
            echo ''
            echo '  on_macos do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"${BASE}/crev-darwin-arm64\""
            echo "      sha256 \"${SHA_DA}\""
            echo '    else'
            echo "      url \"${BASE}/crev-darwin-x64\""
            echo "      sha256 \"${SHA_DX}\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  on_linux do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"${BASE}/crev-linux-arm64\""
            echo "      sha256 \"${SHA_LA}\""
            echo '    else'
            echo "      url \"${BASE}/crev-linux-x64\""
            echo "      sha256 \"${SHA_LX}\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    bin.install Dir["crev-*"].first => "crev"'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    assert_match version.to_s, shell_output("#{bin}/crev --version")'
            echo '  end'
            echo 'end'
          } > Formula/crev.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/crev.rb
          git diff --cached --quiet && echo "No changes" || (git commit -m "crev ${GITHUB_REF_NAME}" && git push)
