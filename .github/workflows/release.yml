name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter crev publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: crev-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: crev-linux-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: crev-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: crev-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: crev-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build --compile --target=${{ matrix.target }} ./packages/cli/src/bin.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum */crev-* > ../checksums.txt
          cat ../checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/crev-linux-x64/crev-linux-x64
            artifacts/crev-linux-arm64/crev-linux-arm64
            artifacts/crev-darwin-x64/crev-darwin-x64
            artifacts/crev-darwin-arm64/crev-darwin-arm64
            artifacts/crev-windows-x64.exe/crev-windows-x64.exe
            checksums.txt

  update-homebrew:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: caiokf/homebrew-crev
          token: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/caiokf/crev/releases/download/${GITHUB_REF_NAME}"

          SHA_DARWIN_ARM64=$(curl -sSL "${BASE_URL}/crev-darwin-arm64" | sha256sum | cut -d' ' -f1)
          SHA_DARWIN_X64=$(curl -sSL "${BASE_URL}/crev-darwin-x64" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_X64=$(curl -sSL "${BASE_URL}/crev-linux-x64" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(curl -sSL "${BASE_URL}/crev-linux-arm64" | sha256sum | cut -d' ' -f1)

          cat > Formula/crev.rb << FORMULA
          class Crev < Formula
            desc "Multi-AI code review CLI"
            homepage "https://github.com/caiokf/crev"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/crev-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/crev-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/crev-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/crev-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install Dir["crev-*"].first => "crev"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/crev --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/crev.rb
          git commit -m "crev ${GITHUB_REF_NAME}"
          git push
