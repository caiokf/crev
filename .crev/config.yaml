# yaml-language-server: $schema=../packages/cli/schemas/crev-config.json
defaults:
  schema: quick
  type: all
  base: main

runtimes:
  claude:
    command: claude

aliases:
  opus: claude-opus-4-6
  sonnet: claude-sonnet-4-6
  haiku: claude-haiku-4-5-20251001

diff:
  exclude:
    - "pnpm-lock.yaml"
    - "package-lock.json"
    - "yarn.lock"
    - "**/*.snap"
    - "**/*.generated.ts"

output:
  dir: .crev/reviews
  format: json

normalizer:
  enabled: true
  runtime: claude
  model: haiku

triage:
  enabled: false
  runtime: claude
  model: opus
  context: []
